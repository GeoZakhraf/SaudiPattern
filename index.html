 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Saudi Heritage Studio v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b14;--pan:#0e1525;--s2:#152038;--acc:#c49035;--acl:#f0c060;--txt:#dce2ec;--dim:#5a7094;--bdr:#1a2844;--purple:#a78bfa}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;-webkit-user-select:none;user-select:none}
#bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:linear-gradient(90deg,#0a1020,#121d35);border-bottom:1px solid var(--bdr);flex-shrink:0;font-size:.65rem;color:var(--dim)}
#bar .logo{font-size:.78rem;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#bar em{color:var(--acl);font-style:normal;font-weight:600}
#bar .badge{font-size:.55rem;background:var(--acc);color:#000;padding:1px 5px;border-radius:8px;font-weight:700}
#canvasArea{flex:1;display:flex;justify-content:center;align-items:center;padding:6px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#111e35 0%,#070b14 70%);min-height:0;position:relative}
#cv{max-width:100%;max-height:100%;border-radius:4px;box-shadow:0 8px 40px #0009,0 0 0 1px var(--bdr);touch-action:none}
#dragHint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--dim);background:#0e1525cc;padding:3px 10px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .3s}
#dragHint.show{opacity:1}
#panel{background:linear-gradient(180deg,var(--pan),#080e1a);border-top:2px solid var(--bdr);padding:12px 12px 40px;height:50vh;overflow-y:auto;overflow-x:hidden;border-radius:14px 14px 0 0;flex-shrink:0;-webkit-overflow-scrolling:touch}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.sec{color:var(--acc);font-size:.8rem;font-weight:700;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:5px}.sec:first-child{margin-top:0}
.sec .cnt{font-size:.55rem;background:var(--bdr);color:var(--dim);padding:1px 4px;border-radius:6px;margin-right:auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
button{background:var(--s2);color:var(--txt);border:1px solid var(--bdr);padding:7px 5px;border-radius:7px;cursor:pointer;font-size:.68rem;font-weight:500;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .13s}
button:active{transform:scale(.95)}
button.on{background:rgba(196,144,53,.12);border-color:var(--acc);color:var(--acl)}
button.big{background:linear-gradient(135deg,#c49035,#a07528);color:#070b14;font-weight:700;border:none;padding:9px;font-size:.74rem}
button.mix-on{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
.cat{margin:7px 0 3px;padding:2px 7px;font-size:.63rem;color:var(--dim);background:rgba(196,144,53,.06);border-radius:4px;display:inline-flex;align-items:center;border:1px solid rgba(196,144,53,.08)}
.pgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:3px;margin-bottom:3px}
.ctrl{background:rgba(0,0,0,.25);padding:8px 10px;border-radius:7px;margin-bottom:6px}
.ctrl label{display:flex;justify-content:space-between;font-size:.72rem;color:#7e92af;margin-bottom:5px}
.ctrl label b{color:var(--acl);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;background:transparent;margin:2px 0}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--bdr);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);margin-top:-6px;cursor:pointer}
.cRow{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cBox{background:rgba(0,0,0,.25);padding:6px;border-radius:7px}
.cBox label{font-size:.66rem;color:#7e92af;margin-bottom:3px;display:block}
.cBox .cw{position:relative;height:28px;border-radius:5px;overflow:hidden;border:1px solid var(--bdr)}
.cBox .cw input{position:absolute;top:-3px;left:-3px;width:calc(100% + 6px);height:calc(100% + 6px);border:none;cursor:pointer;background:transparent}
.hide{display:none!important}
#mixPanel{background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.15);border-radius:8px;padding:8px;margin-top:6px}
#mixList{max-height:120px;overflow-y:auto;margin:4px 0}
.mItem{display:flex;align-items:center;gap:4px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.12);border-radius:8px;padding:4px 6px;margin-bottom:3px;font-size:.62rem}
.mItem.sel{border-color:var(--purple);background:rgba(167,139,250,.18)}
.mItem .dot{width:12px;height:12px;border-radius:50%;border:1px solid #fff3;flex-shrink:0;cursor:pointer}
.mItem .mName{flex:1;color:var(--purple);font-weight:600;cursor:pointer}
.mItem .mSz{width:50px;-webkit-appearance:none;height:2px;background:var(--bdr);border-radius:1px;margin:0 4px}
.mItem .mSz::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--purple);cursor:pointer}
.mItem .x{cursor:pointer;opacity:.5;font-size:.7rem;color:var(--purple)}
.mItem .x:hover{opacity:1}
.thgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:3px}
.thsw{display:flex;height:20px;border-radius:4px;overflow:hidden;border:1px solid var(--bdr);cursor:pointer;transition:all .13s}
.thsw:hover,.thsw.on{border-color:var(--acl)}
.thsw div{flex:1}
@media(min-width:768px){body{flex-direction:row}#canvasArea{flex:1;height:100vh}#panel{width:380px;height:100vh;border-radius:0;border-top:none;border-right:2px solid var(--bdr)}}
</style>
</head>
<body>
<div id="bar">
<span class="logo">🏛️ Heritage Studio</span>
<span>النمط: <em id="sN">أبواب نجد</em></span>

</div>

</div>
<div class="sec">🎲 عشوائيات</div>
<div class="g3"><button id="rA">🎰 فاجئني</button><button id="rS">📐 هيكل</button><button id="rC">🎨 ألوان</button></div>
<div id="rSec" class="hide">
<div class="sec">🔲 الشبكة</div>
<div class="g2">
<div class="ctrl"><label><span>أعمدة</span><b id="vC">3</b></label><input type="range" id="iC" min="1" max="12" value="3"></div>
<div class="ctrl"><label><span>صفوف</span><b id="vR">3</b></label><input type="range" id="iR" min="1" max="12" value="3"></div>
</div>
<div class="ctrl"><label><span>تباعد</span><b id="vSp">15</b></label><input type="range" id="iSp" min="0" max="150" step="5" value="15"></div>
</div>
<div class="sec">📐 تحكم</div>
<div class="ctrl"><label><span>الحجم</span><b id="vSz">400</b></label><input type="range" id="iSz" min="40" max="900" step="5" value="400"></div>
<div class="ctrl"><label><span>السماكة</span><b id="vTh">3</b></label><input type="range" id="iTh" min="0.5" max="25" step="0.5" value="3"></div>
<div class="ctrl"><label><span>التعقيد</span><b id="vCx">3</b></label><input type="range" id="iCx" min="1" max="10" value="3"></div>
<div class="ctrl"><label><span>الدوران</span><b id="vRo">0°</b></label><input type="range" id="iRo" min="0" max="360" value="0"></div>
<div class="sec">🎨 ألوان</div>
<div class="cRow">
<div class="cBox"><label>الزخرفة</label><div class="cw"><input type="color" id="iSc" value="#c49035"></div></div>
<div class="cBox"><label>الخلفية</label><div class="cw"><input type="color" id="iBc" value="#070b14"></div></div>
</div>
<button id="bT" style="width:100%;margin-top:6px">🔲 خلفية شفافة</button>
</div>
<script>
(function(){
"use strict";
var EX=9500,PV=1000,PI=Math.PI,TAU=PI*2,DEG=PI/180;

var S={pat:'najdi',mode:'single',trBg:false,mixMode:false,mixItems:[],selIdx:-1,dragging:false,dragIdx:-1};

var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function $(id){return document.getElementById(id)}
var iC=$('iC'),iR=$('iR'),iSp=$('iSp'),iSz=$('iSz'),iTh=$('iTh'),iCx=$('iCx'),iRo=$('iRo'),iSc=$('iSc'),iBc=$('iBc');

var themes=[
{n:'ذهبي',c:['#c49035','#f0c060','#8b6914','#d4a84b'],bg:'#070b14'},
{n:'نجدي',c:['#8B4513','#D2691E','#DEB887','#A0522D'],bg:'#1a0e08'},
{n:'حجازي',c:['#1e90ff','#4169e1','#87ceeb','#00bfff'],bg:'#0a0e1a'},
{n:'واحة',c:['#228B22','#32CD32','#90EE90','#006400'],bg:'#0a1208'},
{n:'صحراء',c:['#EDC9AF','#C19A6B','#D2B48C','#F5DEB3'],bg:'#1a1408'},
{n:'عسيري',c:['#FF1493','#FF6347','#FFD700','#00CED1'],bg:'#0d0818'},
{n:'فيروزي',c:['#40E0D0','#48D1CC','#00CED1','#20B2AA'],bg:'#081210'},
{n:'بنفسجي',c:['#9370DB','#8A2BE2','#BA55D3','#DDA0DD'],bg:'#0e081a'},
{n:'أحمر',c:['#DC143C','#B22222','#FF6347','#CD5C5C'],bg:'#140808'},
{n:'أبيض',c:['#FFFFFF','#F5F5F5','#DCDCDC','#C0C0C0'],bg:'#1a1a2e'},
{n:'غروب',c:['#FF8C00','#FF6347','#FFD700','#FF4500'],bg:'#12080a'},
{n:'وردي',c:['#FF69B4','#FF1493','#DB7093','#FFB6C1'],bg:'#140810'}
];

var cats=[
{n:'🏛️ عمارة',p:[['najdi','أبواب نجد'],['najdi_win','شبابيك'],['najdi_mud','طين نجدي'],['turaif','الطريف'],['qubbah','قبة'],['roshan','روشن'],['mashrab','مشربية'],['hij_door','باب حجازي'],['hij_stucco','جص حجازي'],['balad','إفريز'],['coral','مرجاني'],['hasawi','جص حساوي'],['muqarnas','مقرنص'],['has_palm','سعف'],['ahsa_tile','بلاط'],['asiri','قط عسيري'],['asiri_tri','مثلثات'],['asiri_zig','تعرج'],['asiri_dot','نقاط'],['asiri_mir','مرايا'],['asiri_crn','تاج'],['hail','نقوش حائل'],['nfort','حصن']]},
{n:'🧵 نسيج',p:[['sadu','سدو'],['sadu_chv','شيفرون'],['sadu_tri','مثلثات سدو'],['sadu_cam','جمل'],['sadu_plm','نخلة'],['sadu_sco','عقرب'],['sadu_hrs','حصان'],['sadu_tnt','خيمة'],['sadu_csh','وسادة'],['sadu_str','خطوط'],['nth_emb','تطريز نجدي'],['hij_emb','تطريز حجازي'],['asi_drs','ثوب عسيري'],['bisht','بشت']]},
{n:'⭐ نجوم',p:[['star6','نجمة٦'],['star8','نجمة٨'],['star10','نجمة١٠'],['star12','نجمة١٢'],['star16','نجمة١٦'],['girih','جيره'],['muq_geo','مقرنص'],['arabes','أرابيسك'],['kufic','كوفي'],['zellige','زليج'],['knot','عقدة']]},
{n:'🏺 حرف',p:[['pottery','فخار'],['ceram','سيراميك'],['silver','فضة'],['amulet','تعويذة'],['janbiya','جنبية'],['dpanel','لوح باب'],['mwood','مشربية'],['rscreen','روشن'],['pbask','سلة سعف'],['gbask','سلة حشائش'],['dbask','سلة تمور']]},
{n:'🌿 رموز',p:[['gpalm','نخلة'],['gfalcon','صقر'],['gsword','سيف'],['gcamel','جمل'],['gdallah','دلة'],['drose','وردة'],['goryx','مها'],['stcres','هلال']]}
];
var allIds=[],allNames={};
cats.forEach(function(c){c.p.forEach(function(p){allIds.push(p[0]);allNames[p[0]]=p[1]})});
$('pCnt').textContent=allIds.length;

function polyP(cx,cy,r,n,a0){var p=[];for(var i=0;i<n;i++){var a=a0+TAU*i/n;p.push([cx+Math.cos(a)*r,cy+Math.sin(a)*r])}return p}
function starP(cx,cy,R,r2,n,a0){var p=[];for(var i=0;i<n*2;i++){var a=a0+PI*i/n;p.push([cx+Math.cos(a)*(i%2?r2:R),cy+Math.sin(a)*(i%2?r2:R)])}return p}
function rotP(pts,cx,cy,a){if(Math.abs(a)<.001)return pts;var co=Math.cos(a),si=Math.sin(a);return pts.map(function(p){var dx=p[0]-cx,dy=p[1]-cy;return[cx+dx*co-dy*si,cy+dx*si+dy*co]})}
function randCol(){return'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function F(v){return v.toFixed(2)}

function mkD(c,sv,col){return{
poly:function(p){if(!p||p.length<2)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.closePath();c.stroke();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+' Z" stroke="'+col+'"/>\n')},
line:function(a,b,d,e){c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();sv.push('<line x1="'+F(a)+'" y1="'+F(b)+'" x2="'+F(d)+'" y2="'+F(e)+'" stroke="'+col+'"/>\n')},
circ:function(x,y,r){if(r<.3)return;c.beginPath();c.arc(x,y,r,0,TAU);c.stroke();sv.push('<circle cx="'+F(x)+'" cy="'+F(y)+'" r="'+F(r)+'" stroke="'+col+'"/>\n')},
rect:function(x,y,w,h){c.beginPath();c.rect(x,y,w,h);c.stroke();sv.push('<rect x="'+F(x)+'" y="'+F(y)+'" width="'+F(w)+'" height="'+F(h)+'" stroke="'+col+'"/>\n')},
bez:function(p){if(!p||p.length<4)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);c.bezierCurveTo(p[1][0],p[1][1],p[2][0],p[2][1],p[3][0],p[3][1]);c.stroke();sv.push('<path d="M'+F(p[0][0])+' '+F(p[0][1])+' C'+F(p[1][0])+' '+F(p[1][1])+','+F(p[2][0])+' '+F(p[2][1])+','+F(p[3][0])+' '+F(p[3][1])+'" stroke="'+col+'"/>\n')},
quad:function(p){if(!p||p.length<3)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);c.quadraticCurveTo(p[1][0],p[1][1],p[2][0],p[2][1]);c.stroke();sv.push('<path d="M'+F(p[0][0])+' '+F(p[0][1])+' Q'+F(p[1][0])+' '+F(p[1][1])+','+F(p[2][0])+' '+F(p[2][1])+'" stroke="'+col+'"/>\n')},
mline:function(p){if(!p||p.length<2)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.stroke();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+'" stroke="'+col+'"/>\n')},
dot:function(x,y,r){if(r<.3)return;c.save();c.fillStyle=col;c.beginPath();c.arc(x,y,r,0,TAU);c.fill();c.restore();sv.push('<circle cx="'+F(x)+'" cy="'+F(y)+'" r="'+F(r)+'" fill="'+col+'" stroke="none"/>\n')},
fpoly:function(p){if(!p||p.length<2)return;c.save();c.fillStyle=col;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.closePath();c.fill();c.restore();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+' Z" fill="'+col+'" stroke="none"/>\n')},
arc:function(x,y,r,a1,a2){c.beginPath();c.arc(x,y,r,a1,a2);c.stroke();var sx=x+Math.cos(a1)*r,sy=y+Math.sin(a1)*r,ex2=x+Math.cos(a2)*r,ey2=y+Math.sin(a2)*r;sv.push('<path d="M'+F(sx)+' '+F(sy)+' A'+F(r)+' '+F(r)+' 0 '+(Math.abs(a2-a1)>PI?1:0)+' 1 '+F(ex2)+' '+F(ey2)+'" stroke="'+col+'"/>\n')}
}}

/* ═══ MOTIF - using previous v6 engine exactly ═══ */
function drawMotif(D,type,mx,my,rad,comp,rot){
var r=rad*.46,i,j,k,a,n,s,px,py,ir,bw,bh,yy,tw,th,g;
switch(type){
case'najdi':D.poly(polyP(mx,my,r,8,rot-PI/8));D.poly(polyP(mx,my,r*.92,8,rot-PI/8));D.poly(polyP(mx,my,r*.7,4,rot));D.poly(polyP(mx,my,r*.7,4,rot+PI/4));D.poly(polyP(mx,my,r*.52,4,rot));for(i=0;i<8;i++){a=rot-PI/8+TAU*i/8;D.line(mx+Math.cos(a)*r*.92,my+Math.sin(a)*r*.92,mx+Math.cos(a)*r*.7,my+Math.sin(a)*r*.7)}n=4+comp*2;for(i=0;i<n;i++){a=rot+TAU*i/n;D.line(mx+Math.cos(a)*r*.25,my+Math.sin(a)*r*.25,mx+Math.cos(a)*r*.42,my+Math.sin(a)*r*.42)}D.circ(mx,my,r*.25);D.circ(mx,my,r*.15);D.dot(mx,my,r*.05);for(i=1;i<=Math.min(comp-1,5);i++){ir=r*(.3+i*.08);if(ir>r*.65)break;D.poly(polyP(mx,my,ir,4,rot+i*PI/8))}if(comp>5)D.poly(starP(mx,my,r*.48,r*.2,8,rot+PI/16));break;
case'najdi_win':D.poly(polyP(mx,my,r*.95,4,rot+PI/4));D.poly(polyP(mx,my,r*.88,4,rot+PI/4));s=r*.28;for(i=-4;i<=4;i++){var lx=mx+i*s*.707;D.line(Math.max(mx-r*.88,lx),my-r*.88,Math.min(mx+r*.88,lx+r*1.76),my+r*.88);D.line(Math.max(mx-r*.88,lx),my+r*.88,Math.min(mx+r*.88,lx+r*1.76),my-r*.88)}if(comp>2)for(i=-3;i<=3;i++)for(j=-3;j<=3;j++){px=mx+i*s;py=my+j*s;if(Math.abs(px-mx)<r*.8&&Math.abs(py-my)<r*.8)D.dot(px,py,s*.06)}break;

/* ═══ PAINT ═══ */
var raf=null;
function render(){
$('vC').textContent=iC.value;$('vR').textContent=iR.value;$('vSp').textContent=iSp.value;
$('vSz').textContent=iSz.value;$('vTh').textContent=iTh.value;$('vCx').textContent=iCx.value;
$('vRo').textContent=iRo.value+'°';
if(raf)cancelAnimationFrame(raf);
raf=requestAnimationFrame(function(){doPaint(ctx,PV,PV,1)});
}

function doPaint(c,W,H,scale){
var sz=parseFloat(iSz.value)*scale,comp=parseInt(iCx.value),rotVal=parseFloat(iRo.value)*DEG;
var thick=parseFloat(iTh.value)*scale,stroke=iSc.value;
c.clearRect(0,0,W,H);
if(!S.trBg){c.fillStyle=iBc.value;c.fillRect(0,0,W,H)}
var svgP=[],hasMix=S.mixItems.length>0;

function drawAt(cx2,cy2,drawSz){
if(hasMix){
for(var mi=0;mi<S.mixItems.length;mi++){
var item=S.mixItems[mi];
var iSz2=drawSz*(item.scale||1);
var iRot=rotVal+(item.rot||0)*DEG;
/* Position: use item.x,item.y as pixel offsets from center */
var ix=cx2+(item.x||0)*scale;
var iy=cy2+(item.y||0)*scale;
c.strokeStyle=item.color;c.lineWidth=thick;c.lineJoin='round';c.lineCap='round';
var D=mkD(c,svgP,item.color);
drawMotif(D,item.id,ix,iy,iSz2,comp,iRot);
/* Draw selection ring for selected item */
if(mi===S.selIdx&&scale===1){
c.save();c.strokeStyle='rgba(167,139,250,0.5)';c.lineWidth=1;c.setLineDash([4,4]);
c.beginPath();c.arc(ix,iy,iSz2*.5,0,TAU);c.stroke();c.setLineDash([]);c.restore();
}
}
}else{
c.strokeStyle=stroke;c.lineWidth=thick;c.lineJoin='round';c.lineCap='round';
var D=mkD(c,svgP,stroke);
drawMotif(D,S.pat,cx2,cy2,drawSz,comp,rotVal);
}
}

if(S.mode==='single'){drawAt(W/2,H/2,sz)}
else{
var cols=parseInt(iC.value),rows=parseInt(iR.value),sp=parseFloat(iSp.value)*scale;
var totalW=cols*sz+(cols-1)*sp,totalH=rows*sz+(rows-1)*sp;
var startX=(W-totalW)/2+sz/2,startY=(H-totalH)/2+sz/2;
for(var ci=0;ci<cols;ci++)for(var ri2=0;ri2<rows;ri2++)drawAt(startX+ci*(sz+sp),startY+ri2*(sz+sp),sz);
}
return{parts:svgP,stroke:stroke,thick:thick};
}

/* ═══ TOUCH/MOUSE DRAG ON CANVAS ═══ */
function getCanvasPos(e){
var rect=cv.getBoundingClientRect();
var touch=e.touches?e.touches[0]:e;
var scaleX=PV/rect.width,scaleY=PV/rect.height;
return{x:(touch.clientX-rect.left)*scaleX, y:(touch.clientY-rect.top)*scaleY};
}

function findItem(px,py){
if(S.mixItems.length===0)return -1;
var sz=parseFloat(iSz.value);
var cx2=PV/2,cy2=PV/2;
/* Check from top (last drawn) to bottom */
for(var i=S.mixItems.length-1;i>=0;i--){
var item=S.mixItems[i];
var ix=cx2+(item.x||0);
var iy=cy2+(item.y||0);
var hitR=sz*(item.scale||1)*0.25;
if(Math.hypot(px-ix,py-iy)<hitR)return i;
}
return -1;
}

var dragStart={x:0,y:0},dragItemStart={x:0,y:0};

cv.addEventListener('pointerdown',function(e){
if(S.mixItems.length===0||S.mode!=='single')return;
var pos=getCanvasPos(e);
var idx=findItem(pos.x,pos.y);
if(idx>=0){
S.dragging=true;S.dragIdx=idx;S.selIdx=idx;
dragStart={x:pos.x,y:pos.y};
dragItemStart={x:S.mixItems[idx].x||0,y:S.mixItems[idx].y||0};
cv.setPointerCapture(e.pointerId);
updateMixUI();render();
e.preventDefault();
}
});

cv.addEventListener('pointermove',function(e){
if(!S.dragging||S.dragIdx<0)return;
var pos=getCanvasPos(e);
var dx=pos.x-dragStart.x,dy=pos.y-dragStart.y;
S.mixItems[S.dragIdx].x=dragItemStart.x+dx;
S.mixItems[S.dragIdx].y=dragItemStart.y+dy;
render();
e.preventDefault();
});

cv.addEventListener('pointerup',function(e){
if(S.dragging){S.dragging=false;S.dragIdx=-1}
});

cv.addEventListener('pointercancel',function(e){
S.dragging=false;S.dragIdx=-1;
});

/* ═══ MIX UI ═══ */
function addToMix(id){
if(S.mixItems.length>=10)return;
/* Random position spread */
var spread=150;
S.mixItems.push({
id:id,color:randCol(),scale:1,rot:0,
x:(Math.random()-0.5)*spread,
y:(Math.random()-0.5)*spread
});
S.selIdx=S.mixItems.length-1;
$('dragHint').classList.add('show');
setTimeout(function(){$('dragHint').classList.remove('show')},3000);
updateMixUI();render();
}

function updateMixUI(){
var list=$('mixList');list.innerHTML='';
$('mCnt').textContent=S.mixItems.length;
S.mixItems.forEach(function(item,idx){
var row=document.createElement('div');row.className='mItem';
if(idx===S.selIdx)row.classList.add('sel');
/* Color dot */
var dot=document.createElement('span');dot.className='dot';dot.style.background=item.color;
dot.onclick=function(){item.color=randCol();updateMixUI();render()};
/* Name */
var name=document.createElement('span');name.className='mName';name.textContent=allNames[item.id]||item.id;
name.onclick=function(){S.selIdx=idx;updateMixUI();render()};
/* Size slider */
var sz=document.createElement('input');sz.type='range';sz.className='mSz';
sz.min='0.3';sz.max='2';sz.step='0.05';sz.value=item.scale||1;
sz.oninput=function(){item.scale=parseFloat(this.value);render()};
/* Remove */
var x=document.createElement('span');x.className='x';x.textContent='✕';
x.onclick=function(){S.mixItems.splice(idx,1);if(S.selIdx>=S.mixItems.length)S.selIdx=S.mixItems.length-1;updateMixUI();render()};
row.appendChild(dot);row.appendChild(name);row.appendChild(sz);row.appendChild(x);
list.appendChild(row);
});
}

$('mTog').onclick=function(){S.mixMode=!S.mixMode;this.textContent=S.mixMode?'✅ وضع الإضافة نشط':'➕ إضافة للمزج';this.classList.toggle('mix-on',S.mixMode);document.querySelectorAll('.pgr button').forEach(function(b){b.style.borderColor=S.mixMode?'rgba(167,139,250,.3)':''})};
$('mClr').onclick=function(){S.mixItems=[];S.selIdx=-1;updateMixUI();render()};
$('mCen').onclick=function(){S.mixItems.forEach(function(item){item.x=0;item.y=0});render()};
$('mRC').onclick=function(){S.mixItems.forEach(function(item){item.color=randCol()});updateMixUI();render()};
$('mSh').onclick=function(){for(var i2=S.mixItems.length-1;i2>0;i2--){var j2=Math.floor(Math.random()*(i2+1));var tmp=S.mixItems[i2];S.mixItems[i2]=S.mixItems[j2];S.mixItems[j2]=tmp}S.mixItems.forEach(function(item){item.rot=Math.random()*360;item.scale=0.5+Math.random()*1;item.x=(Math.random()-0.5)*200;item.y=(Math.random()-0.5)*200});updateMixUI();render()};

/* ═══ THEMES ═══ */
var thG=$('thG');
themes.forEach(function(t,idx){var sw=document.createElement('div');sw.className='thsw';sw.title=t.n;t.c.forEach(function(col){var d=document.createElement('div');d.style.background=col;sw.appendChild(d)});sw.onclick=function(){iBc.value=t.bg;iSc.value=t.c[0];document.querySelectorAll('.thsw').forEach(function(s2,i2){s2.classList.toggle('on',i2===idx)});S.mixItems.forEach(function(item,i2){item.color=t.c[i2%t.c.length]});updateMixUI();render()};thG.appendChild(sw)});

var pB=$('pB');
cats.forEach(function(c){var lb=document.createElement('div');lb.className='cat';lb.textContent=c.n;pB.appendChild(lb);var g=document.createElement('div');g.className='pgr';c.p.forEach(function(p){var b=document.createElement('button');b.textContent=p[1];b.setAttribute('data-p',p[0]);if(p[0]===S.pat)b.classList.add('on');b.onclick=function(){if(S.mixMode){addToMix(p[0]);return}sP(p[0])};g.appendChild(b)});pB.appendChild(g)});

function sP(id){S.pat=id;document.querySelectorAll('.pgr button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-p')===id)});$('sN').textContent=allNames[id]||id;render()}

/* ═══ EXPORT ═══ */
$('xP').onclick=function(){try{var ec=document.createElement('canvas');ec.width=EX;ec.height=EX;var ectx=ec.getContext('2d');if(!ectx){alert('ذاكرة غير كافية');return}doPaint(ectx,EX,EX,EX/PV);ec.toBlob(function(blob){if(!blob){alert('فشل');return}var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='Saudi_'+Date.now()+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u);ec.width=1;ec.height=1},500)},'image/png')}catch(e){alert(e.message)}};
$('xS').onclick=function(){var noop=function(){};var oc={beginPath:noop,moveTo:noop,lineTo:noop,closePath:noop,arc:noop,rect:noop,stroke:noop,bezierCurveTo:noop,quadraticCurveTo:noop,fill:noop,save:noop,restore:noop,clearRect:noop,fillRect:noop,setLineDash:noop};['strokeStyle','fillStyle','lineWidth','lineJoin','lineCap'].forEach(function(p){Object.defineProperty(oc,p,{set:noop,get:function(){return''}})});var data=doPaint(oc,EX,EX,EX/PV);var svg='<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+EX+' '+EX+'" width="'+EX+'" height="'+EX+'">\n';if(!S.trBg)svg+='<rect width="100%" height="100%" fill="'+iBc.value+'"/>\n';svg+='<g fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-width="'+data.thick.toFixed(2)+'">\n';svg+=data.parts.join('');svg+='</g>\n</svg>';var blob=new Blob([svg],{type:'image/svg+xml'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='Saudi_'+Date.now()+'.svg';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u)},500)};

/* ═══ MODE/UI ═══ */
document.querySelectorAll('#mB button').forEach(function(b){b.onclick=function(){S.mode=b.getAttribute('data-m');document.querySelectorAll('#mB button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');$('rSec').classList.toggle('hide',S.mode!=='repeat');if(S.mode==='repeat'&&parseFloat(iSz.value)>350)iSz.value=180;if(S.mode==='single'&&parseFloat(iSz.value)<200)iSz.value=400;$('sM').textContent=S.mode==='single'?'مفرد':'متكرر';render()}});
$('bT').onclick=function(){S.trBg=!S.trBg;$('bT').textContent=S.trBg?'🎨 خلفية ملونة':'🔲 خلفية شفافة';$('bT').classList.toggle('on',S.trBg);render()};
[iC,iR,iSp,iSz,iTh,iCx,iRo,iSc,iBc].forEach(function(el){el.addEventListener('input',render)});

function hH(h,s2,l){var e=document.createElement('canvas').getContext('2d');e.fillStyle='hsl('+h+','+s2+'%,'+l+'%)';return e.fillStyle}
$('rC').onclick=function(){var h=ri(0,360);iSc.value=hH(h,ri(60,95),ri(55,80));if(!S.trBg)iBc.value=hH((h+ri(120,240))%360,ri(15,35),ri(6,16));if(S.mixItems.length>0){S.mixItems.forEach(function(item){item.color=randCol()});updateMixUI()}render()};
$('rS').onclick=function(){iC.value=ri(2,7);iR.value=ri(2,7);iSp.value=ri(0,50);iSz.value=S.mode==='single'?ri(300,650):ri(80,220);iCx.value=ri(1,8);iTh.value=ri(1,10);iRo.value=pick([0,15,30,45,60,90]);render()};
$('rA').onclick=function(){if(S.mixItems.length>0){S.mixItems.forEach(function(item){item.id=pick(allIds);item.color=randCol();item.rot=Math.random()*360;item.scale=.5+Math.random();item.x=(Math.random()-.5)*200;item.y=(Math.random()-.5)*200});updateMixUI()}else sP(pick(allIds));$('rC').onclick();$('rS').onclick()};

render();
})();
