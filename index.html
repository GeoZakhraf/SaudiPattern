<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Saudi Heritage Studio v10</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b14;--pan:#0e1525;--s2:#152038;--acc:#c49035;--acl:#f0c060;--txt:#dce2ec;--dim:#5a7094;--bdr:#1a2844;--purple:#a78bfa;--ai:#22d3ee}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;-webkit-user-select:none;user-select:none}
#bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:linear-gradient(90deg,#0a1020,#121d35);border-bottom:1px solid var(--bdr);flex-shrink:0;font-size:.62rem;color:var(--dim)}
#bar .logo{font-size:.76rem;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#bar em{color:var(--acl);font-style:normal;font-weight:600}
#bar .badge{font-size:.55rem;background:var(--acc);color:#000;padding:1px 5px;border-radius:8px;font-weight:700}
#CA{flex:1;display:flex;justify-content:center;align-items:center;padding:6px;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#111e35 0%,#070b14 70%);min-height:0;position:relative}
#cv{max-width:100%;max-height:100%;border-radius:4px;box-shadow:0 8px 40px #0009,0 0 0 1px var(--bdr);touch-action:none}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:.58rem;color:var(--dim);background:#0e1525dd;padding:3px 10px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .3s}
#hint.show{opacity:1}
#P{background:linear-gradient(180deg,var(--pan),#080e1a);border-top:2px solid var(--bdr);padding:12px 12px 40px;height:50vh;overflow-y:auto;overflow-x:hidden;border-radius:14px 14px 0 0;flex-shrink:0;-webkit-overflow-scrolling:touch}
#P::-webkit-scrollbar{width:3px}#P::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.s{color:var(--acc);font-size:.78rem;font-weight:700;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:5px}.s:first-child{margin-top:0}
.s .c{font-size:.55rem;background:var(--bdr);color:var(--dim);padding:1px 4px;border-radius:6px;margin-right:auto}
.s.ai{color:var(--ai);border-color:rgba(34,211,238,.2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
button{background:var(--s2);color:var(--txt);border:1px solid var(--bdr);padding:7px 5px;border-radius:7px;cursor:pointer;font-size:.67rem;font-weight:500;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .13s}
button:active{transform:scale(.95)}
button.on{background:rgba(196,144,53,.12);border-color:var(--acc);color:var(--acl)}
button.big{background:linear-gradient(135deg,#c49035,#a07528);color:#070b14;font-weight:700;border:none;padding:9px;font-size:.72rem}
button.mo{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
button.ab{background:linear-gradient(135deg,rgba(34,211,238,.1),rgba(34,211,238,.04));border-color:rgba(34,211,238,.25);color:var(--ai)}
.cat{margin:7px 0 3px;padding:2px 7px;font-size:.62rem;color:var(--dim);background:rgba(196,144,53,.06);border-radius:4px;display:inline-flex;align-items:center;border:1px solid rgba(196,144,53,.08)}
.pgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:3px;margin-bottom:3px}
.ct{background:rgba(0,0,0,.25);padding:8px 10px;border-radius:7px;margin-bottom:6px}
.ct label{display:flex;justify-content:space-between;font-size:.72rem;color:#7e92af;margin-bottom:5px}
.ct label b{color:var(--acl);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;background:transparent;margin:2px 0}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--bdr);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--acc);margin-top:-6px;cursor:pointer}
.cR{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cB{background:rgba(0,0,0,.25);padding:6px;border-radius:7px}
.cB label{font-size:.66rem;color:#7e92af;margin-bottom:3px;display:block}
.cB .cw{position:relative;height:28px;border-radius:5px;overflow:hidden;border:1px solid var(--bdr)}
.cB .cw input{position:absolute;top:-3px;left:-3px;width:calc(100% + 6px);height:calc(100% + 6px);border:none;cursor:pointer;background:transparent}
.hide{display:none!important}
#mxP{background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.15);border-radius:8px;padding:8px;margin-top:6px}
#mxL{max-height:110px;overflow-y:auto;margin:4px 0}
.mi{display:flex;align-items:center;gap:3px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.12);border-radius:7px;padding:3px 5px;margin-bottom:2px;font-size:.6rem}
.mi.sl{border-color:var(--purple);background:rgba(167,139,250,.18)}
.mi .dt{width:11px;height:11px;border-radius:50%;border:1px solid #fff3;flex-shrink:0;cursor:pointer}
.mi .mn{flex:1;color:var(--purple);font-weight:600;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi .ms{width:45px;-webkit-appearance:none;height:2px;background:var(--bdr);border-radius:1px;margin:0 2px}
.mi .ms::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--purple);cursor:pointer}
.mi .x{cursor:pointer;opacity:.5;font-size:.65rem;color:var(--purple)}.mi .x:hover{opacity:1}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:3px}
.ts{display:flex;height:20px;border-radius:4px;overflow:hidden;border:1px solid var(--bdr);cursor:pointer;transition:all .13s}
.ts:hover,.ts.on{border-color:var(--acl)}
.ts div{flex:1}
#aP{background:linear-gradient(135deg,rgba(34,211,238,.04),rgba(34,211,238,.02));border:1px solid rgba(34,211,238,.12);border-radius:8px;padding:8px;margin-top:6px}
#aM{font-size:.6rem;color:var(--ai);min-height:18px;margin:4px 0;line-height:1.4;opacity:.85}
@media(min-width:768px){body{flex-direction:row}#CA{flex:1;height:100vh}#P{width:380px;height:100vh;border-radius:0;border-top:none;border-right:2px solid var(--bdr)}}
</style>
</head>
<body>
<div id="bar"><span class="logo">🏛️ Heritage Studio</span><span>النمط: <em id="sN">أبواب نجد</em></span><span id="sM">مفرد</span><span class="badge">v10</span></div>
<div id="CA"><canvas id="cv" width="1000" height="1000"></canvas><div id="hint"></div></div>
<div id="P">
<div class="s">💾 تصدير</div>
<div class="g2"><button class="big" id="xP">📷 PNG 9500px</button><button class="big" id="xS">✏️ SVG</button></div>
<div class="s">📐 العرض</div>
<div class="g2" id="mB"><button class="on" data-m="single">🔷 مفرد</button><button data-m="repeat">🔶 متكرر</button></div>
<div class="s ai">🤖 المصمم الذكي</div>

<div class="g3" style="margin-bottom:4px"><button class="ab" id="a1">🎨 تناغم ألوان</button><button class="ab" id="a2">🏛️ تكوين فني</button><button class="ab" id="a3">🪔 ديكور داخلي</button></div>

</div>
<div class="s">🎨 ثيمات</div>
<div class="tg" id="tG"></div>
<div class="s">🇸🇦 الأنماط <span class="c" id="pC">0</span></div>
<div id="pB"></div>
<div class="s">🔀 المزج <span class="c" id="mC">0</span></div>
<div id="mxP">
<div class="g3" style="margin-bottom:4px"><button id="mt">➕ إضافة</button><button id="mc">🗑️ مسح</button><button id="me">⊹ توسيط</button></div>
<div class="g2"><button id="mr">🎨 ألوان</button><button id="msh">🔀 خلط</button></div>

</div>
<div class="s">🎲 عشوائيات</div>
<div class="g3"><button id="rA">🎰 فاجئني</button><button id="rS">📐 هيكل</button><button id="rC">🎨 ألوان</button></div>
<div id="rSec" class="hide">
<div class="s">🔲 الشبكة</div>
<div class="g2"><div class="ct"><label><span>أعمدة</span><b id="vC">3</b></label><input type="range" id="iC" min="1" max="12" value="3"></div><div class="ct"><label><span>صفوف</span><b id="vR">3</b></label><input type="range" id="iR" min="1" max="12" value="3"></div></div>
<div class="ct"><label><span>تباعد</span><b id="vSp">15</b></label><input type="range" id="iSp" min="0" max="150" step="5" value="15"></div>
</div>
<div class="s">📐 تحكم</div>
<div class="ct"><label><span>الحجم</span><b id="vSz">400</b></label><input type="range" id="iSz" min="40" max="900" step="5" value="400"></div>
<div class="ct"><label><span>السماكة</span><b id="vTh">3</b></label><input type="range" id="iTh" min="0.5" max="25" step="0.5" value="3"></div>
<div class="ct"><label><span>التعقيد</span><b id="vCx">3</b></label><input type="range" id="iCx" min="1" max="10" value="3"></div>
<div class="ct"><label><span>الدوران</span><b id="vRo">0°</b></label><input type="range" id="iRo" min="0" max="360" value="0"></div>
<div class="s">🎨 ألوان</div>
<div class="cR"><div class="cB"><label>الزخرفة</label><div class="cw"><input type="color" id="iSc" value="#c49035"></div></div><div class="cB"><label>الخلفية</label><div class="cw"><input type="color" id="iBc" value="#070b14"></div></div></div>
<button id="bT" style="width:100%;margin-top:6px">🔲 خلفية شفافة</button>
</div>
<script src="data:text/javascript,/*%20Engine%20loaded%20*/"></script>
<script>
(function(){"use strict";

/* ══════════════════════════════════════════════════════
   CORE SETUP
   ══════════════════════════════════════════════════════ */
var EX=9500,PV=1000,PI=Math.PI,TAU=PI*2,D2R=PI/180;
var S={pat:'najdi',mode:'single',tr:false,mm:false,mx:[],si:-1,dr:false,di:-1};
var cv=document.getElementById('cv'),cx=cv.getContext('2d');
function $(i){return document.getElementById(i)}
var iC=$('iC'),iR=$('iR'),iSp=$('iSp'),iSz=$('iSz'),iTh=$('iTh'),iCx=$('iCx'),iRo=$('iRo'),iSc=$('iSc'),iBc=$('iBc');

/* ══════════════════════════════════════════════════════
   PATTERN REGISTRY - 73 patterns (no calligraphy)
   ══════════════════════════════════════════════════════ */
var cats=[
{n:'🏛️ عمارة',p:[
['najdi','أبواب نجد'],['najdi_win','شبابيك نجد'],['najdi_mud','طين نجدي'],['turaif','الطريف'],['qubbah','قبة نجدية'],
['roshan','روشن حجازي'],['mashrab','مشربية'],['hij_door','باب حجازي'],['hij_stucco','جص حجازي'],
['balad','إفريز البلد'],['coral','حجر مرجاني'],['hasawi','جص حساوي'],['muqarnas','مقرنص'],
['has_palm','سعف حساوي'],['ahsa_tile','بلاط أحسائي'],['asiri','قط عسيري'],['asiri_tri','مثلثات عسير'],
['asiri_zig','تعرج عسيري'],['asiri_dot','نقاط عسير'],['asiri_mir','مرايا عسير'],['asiri_crn','تاج عسيري'],
['hail','نقوش حائل'],['nfort','حصن شمالي']]},
{n:'🧵 نسيج',p:[
['sadu','سدو كلاسيك'],['sadu_chv','شيفرون سدو'],['sadu_tri','مثلثات سدو'],['sadu_cam','جمل سدو'],
['sadu_plm','نخلة سدو'],['sadu_sco','عقرب سدو'],['sadu_hrs','حصان سدو'],['sadu_tnt','خيمة سدو'],
['sadu_csh','وسادة سدو'],['sadu_str','خطوط سدو'],['nth_emb','تطريز نجدي'],['hij_emb','تطريز حجازي'],
['asi_drs','ثوب عسيري'],['bisht','حاشية بشت']]},
{n:'⭐ نجوم إسلامية',p:[
['star6','نجمة سداسية'],['star8','نجمة ثمانية'],['star10','نجمة عشارية'],['star12','نجمة ١٢'],['star16','نجمة ١٦'],
['girih','جيره'],['muq_geo','مقرنص هندسي'],['arabes','أرابيسك'],['kufic','كوفي هندسي'],['zellige','زليج'],['knot','عقدة شريطية']]},
{n:'🏺 حرف يدوية',p:[
['pottery','فخار نجدي'],['ceram','سيراميك نجمي'],['silver','فضة نجدية'],['medallion','ميدالية تراثية'],
['janbiya','جنبية'],['dpanel','لوح باب'],['mwood','خشب مشربية'],['rscreen','شاشة روشن'],
['pbask','سلة سعف'],['gbask','سلة حشائش'],['dbask','سلة تمور']]},
{n:'🌿 رموز طبيعية',p:[
['gpalm','نخلة هندسية'],['gfalcon','صقر هندسي'],['gsword','سيف عربي'],['gcamel','جمل هندسي'],
['gdallah','دلة هندسية'],['drose','وردة صحراوية'],['goryx','مها عربي'],['stcres','هلال ونجمة']]}
];
var allIds=[],allN={};
cats.forEach(function(c){c.p.forEach(function(p){allIds.push(p[0]);allN[p[0]]=p[1]})});
$('pC').textContent=allIds.length;

/* ══════════════════════════════════════════════════════
   MATH UTILITIES
   ══════════════════════════════════════════════════════ */
function polyPts(cx2,cy,r,n,a0){
    var p=[];for(var i=0;i<n;i++){var a=a0+TAU*i/n;p.push([cx2+Math.cos(a)*r,cy+Math.sin(a)*r])}return p;
}
function starPts(cx2,cy,R,r2,n,a0){
    var p=[];for(var i=0;i<n*2;i++){var a=a0+PI*i/n;p.push([cx2+Math.cos(a)*(i%2?r2:R),cy+Math.sin(a)*(i%2?r2:R)])}return p;
}
function rotPts(pts,cx2,cy,ang){
    if(Math.abs(ang)<0.001)return pts;
    var co=Math.cos(ang),si=Math.sin(ang);
    return pts.map(function(p){var dx=p[0]-cx2,dy=p[1]-cy;return[cx2+dx*co-dy*si,cy+dx*si+dy*co]});
}
function rc(){return'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pk(a){return a[Math.floor(Math.random()*a.length)]}
function F(v){return v.toFixed(2)}
function hx(h,s,l){var e=document.createElement('canvas').getContext('2d');e.fillStyle='hsl('+h+','+s+'%,'+l+'%)';return e.fillStyle}

/* ══════════════════════════════════════════════════════
   DRAW WRAPPER - Canvas + SVG dual output
   ══════════════════════════════════════════════════════ */
function mkD(c,sv,col){
    return{
        P:function(p){if(!p||p.length<2)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.closePath();c.stroke();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+' Z" stroke="'+col+'"/>\n')},
        L:function(a,b,d,e){c.beginPath();c.moveTo(a,b);c.lineTo(d,e);c.stroke();sv.push('<line x1="'+F(a)+'" y1="'+F(b)+'" x2="'+F(d)+'" y2="'+F(e)+'" stroke="'+col+'"/>\n')},
        C:function(x,y,r){if(r<.3)return;c.beginPath();c.arc(x,y,r,0,TAU);c.stroke();sv.push('<circle cx="'+F(x)+'" cy="'+F(y)+'" r="'+F(r)+'" stroke="'+col+'"/>\n')},
        R:function(x,y,w,h){c.beginPath();c.rect(x,y,w,h);c.stroke();sv.push('<rect x="'+F(x)+'" y="'+F(y)+'" width="'+F(w)+'" height="'+F(h)+'" stroke="'+col+'"/>\n')},
        B:function(p){if(!p||p.length<4)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);c.bezierCurveTo(p[1][0],p[1][1],p[2][0],p[2][1],p[3][0],p[3][1]);c.stroke();sv.push('<path d="M'+F(p[0][0])+' '+F(p[0][1])+' C'+F(p[1][0])+' '+F(p[1][1])+','+F(p[2][0])+' '+F(p[2][1])+','+F(p[3][0])+' '+F(p[3][1])+'" stroke="'+col+'"/>\n')},
        Q:function(p){if(!p||p.length<3)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);c.quadraticCurveTo(p[1][0],p[1][1],p[2][0],p[2][1]);c.stroke();sv.push('<path d="M'+F(p[0][0])+' '+F(p[0][1])+' Q'+F(p[1][0])+' '+F(p[1][1])+','+F(p[2][0])+' '+F(p[2][1])+'" stroke="'+col+'"/>\n')},
        ML:function(p){if(!p||p.length<2)return;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.stroke();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+'" stroke="'+col+'"/>\n')},
        D:function(x,y,r){if(r<.3)return;c.save();c.fillStyle=col;c.beginPath();c.arc(x,y,r,0,TAU);c.fill();c.restore();sv.push('<circle cx="'+F(x)+'" cy="'+F(y)+'" r="'+F(r)+'" fill="'+col+'" stroke="none"/>\n')},
        FP:function(p){if(!p||p.length<2)return;c.save();c.fillStyle=col;c.beginPath();c.moveTo(p[0][0],p[0][1]);for(var k=1;k<p.length;k++)c.lineTo(p[k][0],p[k][1]);c.closePath();c.fill();c.restore();sv.push('<path d="'+p.map(function(v,k){return(k?'L':'M')+F(v[0])+' '+F(v[1])}).join(' ')+' Z" fill="'+col+'" stroke="none"/>\n')},
        A:function(x,y,r,a1,a2){c.beginPath();c.arc(x,y,r,a1,a2);c.stroke();var sx=x+Math.cos(a1)*r,sy=y+Math.sin(a1)*r,ex=x+Math.cos(a2)*r,ey=y+Math.sin(a2)*r;sv.push('<path d="M'+F(sx)+' '+F(sy)+' A'+F(r)+' '+F(r)+' 0 '+(Math.abs(a2-a1)>PI?1:0)+' 1 '+F(ex)+' '+F(ey)+'" stroke="'+col+'"/>\n')}
    };
}

/* ══════════════════════════════════════════════════════
   MOTIF ENGINE - ALL 73 PATTERNS WITH CORRECT DRAWINGS
   Each case draws its unique authentic pattern
   ══════════════════════════════════════════════════════ */
function drawMotif(d,type,mx,my,rad,comp,rot){
    var r=rad*0.46;
    var i,j,k,a,n,s,px,py,ir,bw,bh,yy,tw,th,g,ex,ey;

    switch(type){

    // ═══════════════════ ARCHITECTURE ═══════════════════

    case 'najdi': // Octagonal door frame + khatam star + inner square
        d.P(polyPts(mx,my,r,8,rot-PI/8)); d.P(polyPts(mx,my,r*.92,8,rot-PI/8));
        d.P(polyPts(mx,my,r*.7,4,rot)); d.P(polyPts(mx,my,r*.7,4,rot+PI/4));
        d.P(polyPts(mx,my,r*.52,4,rot));
        for(i=0;i<8;i++){a=rot-PI/8+TAU*i/8;d.L(mx+Math.cos(a)*r*.92,my+Math.sin(a)*r*.92,mx+Math.cos(a)*r*.7,my+Math.sin(a)*r*.7)}
        n=4+comp*2;for(i=0;i<n;i++){a=rot+TAU*i/n;d.L(mx+Math.cos(a)*r*.25,my+Math.sin(a)*r*.25,mx+Math.cos(a)*r*.42,my+Math.sin(a)*r*.42)}
        d.C(mx,my,r*.25);d.C(mx,my,r*.15);d.D(mx,my,r*.05);
        for(i=1;i<=Math.min(comp-1,5);i++){ir=r*(.3+i*.08);if(ir>r*.65)break;d.P(polyPts(mx,my,ir,4,rot+i*PI/8))}
        if(comp>5)d.P(starPts(mx,my,r*.48,r*.2,8,rot+PI/16));
